<div id="confirm-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;padding:1.5rem;max-width:440px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.15);">
    <h3 id="cm-title" style="font-size:1rem;font-weight:700;margin-bottom:.5rem;"></h3>
    <p id="cm-desc" style="font-size:.875rem;color:#6b7280;margin-bottom:1rem;"></p>
    <div id="cm-reason-wrap" style="display:none;margin-bottom:1rem;">
      <label style="display:block;font-size:.875rem;font-weight:500;margin-bottom:.375rem;">理由 <span style="color:#dc2626">*</span></label>
      <textarea id="cm-reason" rows="3" style="width:100%;padding:.5rem .75rem;border:1px solid #e5e7eb;border-radius:6px;font-size:.875rem;resize:vertical;" placeholder="取り下げの理由を入力してください"></textarea>
    </div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="ConfirmModal.cancel()">キャンセル</button>
      <button id="cm-confirm-btn" class="btn btn-primary" onclick="ConfirmModal._execute()"></button>
    </div>
  </div>
</div>

<script>
const ConfirmModal = {
  _callback: null,
  _requireReason: false,

  /**
   * Show the confirmation modal.
   * @param {{title:string, description:string, confirmLabel?:string, requireReason?:boolean, confirmStyle?:string, onConfirm:function}} opts
   */
  show(opts) {
    ConfirmModal._callback = opts.onConfirm;
    ConfirmModal._requireReason = !!opts.requireReason;

    document.getElementById('cm-title').textContent = opts.title || '確認';
    document.getElementById('cm-desc').textContent  = opts.description || '';
    document.getElementById('cm-confirm-btn').textContent = opts.confirmLabel || '実行';

    const btn = document.getElementById('cm-confirm-btn');
    btn.className = 'btn ' + (opts.confirmStyle === 'danger' ? 'btn-danger' : 'btn-primary');

    const reasonWrap = document.getElementById('cm-reason-wrap');
    reasonWrap.style.display = ConfirmModal._requireReason ? 'block' : 'none';
    document.getElementById('cm-reason').value = '';

    const overlay = document.getElementById('confirm-modal-overlay');
    overlay.style.display = 'flex';
    overlay.onclick = function(e) { if (e.target === overlay) ConfirmModal.cancel(); };
  },

  cancel() {
    document.getElementById('confirm-modal-overlay').style.display = 'none';
    ConfirmModal._callback = null;
  },

  _execute() {
    if (ConfirmModal._requireReason) {
      const reason = document.getElementById('cm-reason').value.trim();
      if (!reason) { alert('理由を入力してください'); return; }
      ConfirmModal._callback(reason);
    } else {
      ConfirmModal._callback();
    }
    document.getElementById('confirm-modal-overlay').style.display = 'none';
  }
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') ConfirmModal.cancel();
});
</script>
