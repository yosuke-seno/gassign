<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:       #2563eb;
  --primary-hover: #1d4ed8;
  --success:       #16a34a;
  --warning:       #d97706;
  --danger:        #dc2626;
  --gray-50:       #f9fafb;
  --gray-100:      #f3f4f6;
  --gray-200:      #e5e7eb;
  --gray-400:      #9ca3af;
  --gray-500:      #6b7280;
  --gray-700:      #374151;
  --gray-900:      #111827;
  --radius:        6px;
  --shadow:        0 1px 3px rgba(0,0,0,.1);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  color: var(--gray-900);
  background: var(--gray-50);
  line-height: 1.5;
}

/* ---------- NAV ---------- */
.nav {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-brand { font-weight: 700; font-size: 1rem; color: var(--primary); margin-right: 2rem; text-decoration: none; }
.nav-links { display: flex; gap: .25rem; flex: 1; }
.nav-link {
  padding: .375rem .75rem;
  border-radius: var(--radius);
  color: var(--gray-700);
  text-decoration: none;
  font-size: .875rem;
  white-space: nowrap;
}
.nav-link:hover { background: var(--gray-100); }
.nav-link.active { background: var(--gray-100); font-weight: 600; }
.nav-user { font-size: .8rem; color: var(--gray-500); }

/* ---------- LAYOUT ---------- */
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.page-title { font-size: 1.25rem; font-weight: 700; }

/* ---------- CARDS ---------- */
.card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1.25rem;
}
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
.metric-label { font-size: .8rem; color: var(--gray-500); margin-bottom: .25rem; }
.metric-value { font-size: 2rem; font-weight: 700; }

/* ---------- TABLE ---------- */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: .625rem 1rem; text-align: left; border-bottom: 1px solid var(--gray-200); }
th { font-size: .8rem; font-weight: 600; color: var(--gray-500); background: var(--gray-50); white-space: nowrap; }
tr:hover td { background: var(--gray-50); }
td a { color: var(--primary); text-decoration: none; }
td a:hover { text-decoration: underline; }

/* ---------- BADGES ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  padding: .2rem .6rem;
  border-radius: 99px;
  font-size: .75rem;
  font-weight: 600;
  white-space: nowrap;
}
.badge-draft             { background: var(--gray-100); color: var(--gray-500); }
.badge-internal_signing  { background: #dbeafe; color: var(--primary); }
.badge-external_signing  { background: #fef3c7; color: var(--warning); }
.badge-signed            { background: #dcfce7; color: var(--success); }
.badge-rejected          { background: #fee2e2; color: var(--danger); }

/* ---------- BUTTONS ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: .375rem;
  padding: .5rem 1rem;
  border-radius: var(--radius);
  border: none;
  font-size: .875rem;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
.btn-danger  { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled)  { background: #b91c1c; }
.btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
.btn-secondary:hover:not(:disabled) { background: var(--gray-200); }
.btn-sm { padding: .3rem .6rem; font-size: .8rem; }

/* ---------- FORMS ---------- */
.form-group { margin-bottom: 1rem; }
label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .375rem; }
input[type=text], input[type=email], textarea, select {
  width: 100%;
  padding: .5rem .75rem;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: .875rem;
  background: #fff;
  color: var(--gray-900);
  outline: none;
  transition: border-color .15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--primary); }
.form-hint { font-size: .8rem; color: var(--gray-500); margin-top: .25rem; }
.required::after { content: ' *'; color: var(--danger); }

/* ---------- STEPS ---------- */
.steps { display: flex; gap: 0; margin-bottom: 2rem; }
.step {
  flex: 1;
  padding: .75rem 1rem;
  text-align: center;
  font-size: .875rem;
  background: var(--gray-100);
  color: var(--gray-500);
  border-bottom: 3px solid var(--gray-200);
}
.step.active { color: var(--primary); font-weight: 600; border-bottom-color: var(--primary); background: #eff6ff; }
.step.done   { color: var(--success); border-bottom-color: var(--success); background: #f0fdf4; }

/* ---------- EMPTY STATE ---------- */
.empty { text-align: center; padding: 3rem 1rem; color: var(--gray-500); }
.empty p { margin-top: .5rem; font-size: .875rem; }

/* ---------- ALERTS ---------- */
.alert { padding: .75rem 1rem; border-radius: var(--radius); margin-bottom: 1rem; font-size: .875rem; }
.alert-error   { background: #fee2e2; color: #991b1b; }
.alert-success { background: #dcfce7; color: #166534; }
.alert-info    { background: #dbeafe; color: #1e40af; }

/* ---------- UTIL ---------- */
.text-muted  { color: var(--gray-500); }
.text-sm     { font-size: .8rem; }
.mt-1 { margin-top: .25rem; }
.mt-2 { margin-top: .5rem; }
.mt-4 { margin-top: 1rem; }
.flex { display: flex; }
.gap-2 { gap: .5rem; }
.items-center { align-items: center; }
</style>
